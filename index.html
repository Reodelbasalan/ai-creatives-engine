<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Creatives Engine</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* CUSTOM DATE PICKER */
input[type="date"], input[type="month"]{
  color-scheme: dark;
  cursor:pointer;
}
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="month"]::-webkit-calendar-picker-indicator{
  filter: invert(0.8) sepia(1) saturate(5) hue-rotate(0deg);
  cursor:pointer;
  opacity:0.7;
}
input[type="date"]::-webkit-calendar-picker-indicator:hover,
input[type="month"]::-webkit-calendar-picker-indicator:hover{
  opacity:1;
}
/* DATE FILTER BAR */
.date-filter-bar{
  display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;
  padding:10px 14px;background:var(--bg3);border:0.5px solid var(--border2);
  border-radius:var(--radius-lg);
}
.date-filter-bar label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-right:2px}
.date-filter-bar input{max-width:150px;font-size:12px;padding:5px 10px}
.date-filter-bar .ghost-btn{font-size:11px;padding:5px 12px}

/* MOBILE RESPONSIVE */
@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap}
  .sidebar-nav{display:flex;flex-direction:row;overflow-x:auto;padding:4px}
  .nav-section{display:none}
  .sidebar-footer{display:none}
  .sidebar-logo{padding:10px 14px;border-bottom:none;border-right:0.5px solid var(--border)}
  .stats-grid{grid-template-columns:1fr 1fr!important}
  .pipeline{grid-template-columns:1fr!important}
  .form-grid{grid-template-columns:1fr!important}
  .form-grid-3{grid-template-columns:1fr!important}
  .tone-grid{grid-template-columns:1fr 1fr!important}
  .modal{margin:0;border-radius:0;max-height:100vh}
  .detail-grid{grid-template-columns:1fr!important}
  .topbar{padding:0 1rem}
  .content{padding:1rem}
  .projects-cols{grid-template-columns:2fr 1fr!important}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr!important}
  .auth-box{width:calc(100vw - 2rem);padding:1.5rem}
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1e1e1e;--bg5:#242424;
  --border:#1f1f1f;--border2:#2a2a2a;--border3:#333;
  --yellow:#FACC15;--yellow2:#FDE047;--yellow-dim:#1c1800;--yellow-glow:rgba(250,204,21,0.12);
  --text:#f0f0f0;--text2:#888;--text3:#444;--text4:#2a2a2a;
  --purple:#7F77DD;--purple-dim:#1a1a2e;
  --green:#22c55e;--green-dim:#0a2a1a;
  --amber:#f59e0b;--amber-dim:#2a1a00;
  --red:#ef4444;--red-dim:#2a0a0a;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
  --shadow-lg:0 8px 32px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--yellow)}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);background-image:radial-gradient(ellipse at 20% 50%,rgba(250,204,21,0.03) 0%,transparent 60%)}
.auth-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-xl);padding:2.5rem;width:400px;box-shadow:var(--shadow-lg);animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{font-size:20px;font-weight:700;color:var(--yellow);margin-bottom:4px;letter-spacing:-0.5px}
.auth-sub{font-size:12px;color:var(--text3);margin-bottom:2rem}
.auth-divider{height:0.5px;background:var(--border);margin:1.5rem 0}
.auth-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:0.05em;text-transform:uppercase;font-weight:500}
.auth-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:11px 13px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none;transition:all 0.2s;font-family:'Inter',sans-serif}
.auth-input:focus{border-color:var(--yellow);box-shadow:0 0 0 3px var(--yellow-glow)}
.auth-btn{width:100%;background:var(--yellow);color:#111;border:none;border-radius:var(--radius);padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:all 0.2s;font-family:'Inter',sans-serif}
.auth-btn:hover{background:var(--yellow2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(250,204,21,0.3)}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.auth-err{color:var(--red);font-size:12px;margin-top:8px;display:none;padding:8px 12px;background:var(--red-dim);border-radius:var(--radius)}
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.sidebar-logo{padding:1.25rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:var(--yellow);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:16px;height:16px}
.logo-mark{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-0.3px;line-height:1.2}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px}
.sidebar-nav{padding:8px;flex:1;overflow-y:auto}
.nav-section{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:0.12em;padding:12px 8px 5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;font-size:12.5px;color:var(--text3);cursor:pointer;transition:all 0.15s;border-radius:var(--radius);margin:1px 0;font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-item:hover{color:var(--text2);background:var(--bg3)}
.nav-item.active{color:var(--yellow);background:var(--yellow-dim);font-weight:600}
.nav-badge{margin-left:auto;background:var(--yellow);color:#111;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px}
.sidebar-footer{padding:10px 8px;border-top:0.5px solid var(--border)}
.user-card{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:10px}
.user-role{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.user-email{font-size:11px;color:var(--yellow);margin-top:2px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);cursor:pointer;margin-top:8px;transition:color 0.15s}
.logout-btn:hover{color:var(--red)}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:54px;border-bottom:0.5px solid var(--border);background:var(--bg);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:14px;font-weight:600;color:var(--text)}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.yellow-btn{background:var(--yellow);color:#111;border:none;border-radius:var(--radius);padding:8px 16px;font-size:12.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;font-family:'Inter',sans-serif}
.yellow-btn:hover{background:var(--yellow2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(250,204,21,0.25)}
.yellow-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.content{flex:1;overflow-y:auto;padding:1.5rem}
.page{display:none;animation:fadeIn 0.2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;transition:all 0.2s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-card.c-yellow::before{background:var(--yellow)}
.stat-card.c-purple::before{background:var(--purple)}
.stat-card.c-green::before{background:var(--green)}
.stat-card.c-amber::before{background:var(--amber)}
.stat-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-icon svg{width:14px;height:14px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.07em;font-weight:600}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.5rem}
.pipe-col{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;min-height:140px}
.pipe-col-head{display:flex;align-items:center;gap:6px;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--border)}
.pipe-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pipe-col-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.pipe-count{margin-left:auto;font-size:9px;color:var(--text3);font-weight:600}
.pipe-card{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:9px 10px;margin-bottom:6px;cursor:pointer;transition:all 0.15s}
.pipe-card:hover{border-color:var(--yellow);transform:translateX(2px)}
.pipe-card-name{font-size:11.5px;color:var(--text);font-weight:600;margin-bottom:2px}
.pipe-card-type{font-size:9px;color:var(--text3);text-transform:uppercase}
.pipe-empty{font-size:11px;color:var(--text4);text-align:center;padding:1.5rem 0}
.section-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;font-weight:600}
.section-divider{height:0.5px;background:var(--border);margin:1.25rem 0}
.data-table{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-head{display:grid;padding:10px 16px;border-bottom:0.5px solid var(--border);background:var(--bg3)}
.table-head span{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.table-row{display:grid;padding:11px 16px;border-bottom:0.5px solid var(--border);align-items:center;cursor:pointer;transition:background 0.1s}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--bg3)}
.projects-cols{grid-template-columns:2.5fr 1fr 1.2fr 0.8fr}
.row-name{font-size:13px;color:var(--text);font-weight:600;margin-bottom:1px}
.row-sub{font-size:10px;color:var(--text3)}
.row-meta{font-size:11.5px;color:var(--text2)}
.row-date{font-size:10px;color:var(--text3)}
.table-empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.table-empty-icon{font-size:28px;margin-bottom:8px;opacity:0.3}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-new{background:var(--bg4);color:var(--text2);border:0.5px solid var(--border3)}
.badge-new::before{background:var(--text3)}
.badge-ai{background:var(--purple-dim);color:var(--purple);border:0.5px solid rgba(127,119,221,0.2)}
.badge-ai::before{background:var(--purple)}
.badge-ready{background:var(--green-dim);color:var(--green);border:0.5px solid rgba(34,197,94,0.2)}
.badge-ready::before{background:var(--green)}
.badge-prod{background:var(--amber-dim);color:var(--amber);border:0.5px solid rgba(245,158,11,0.2)}
.badge-prod::before{background:var(--amber)}
.badge-done{background:#0f2a0f;color:#4caf50;border:0.5px solid rgba(76,175,80,0.2)}
.badge-done::before{background:#4caf50}
.form-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:12px}
.form-card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.form-card-title span{font-size:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-label{font-size:11px;color:var(--text2);font-weight:500}
.form-label .opt{color:var(--text3);font-weight:400;font-size:10px}
.form-input,.form-select,.form-textarea{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;width:100%;transition:all 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--yellow);background:var(--bg4);box-shadow:0 0 0 3px var(--yellow-glow)}
.form-select option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6}
.tone-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.tone-opt{padding:10px 6px;font-size:11px;text-align:center;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--text3);background:var(--bg3);transition:all 0.15s;line-height:1.4;font-weight:500}
.tone-opt:hover{color:var(--text2);background:var(--bg4)}
.tone-opt.selected{background:var(--yellow-dim);color:var(--yellow);border-color:var(--yellow);font-weight:600}
.upload-area{border:1px dashed var(--border2);border-radius:var(--radius-lg);padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.upload-area:hover{border-color:var(--yellow);background:var(--yellow-dim)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:24px;margin-bottom:6px}
.upload-label{font-size:12px;color:var(--text3)}
.upload-label span{color:var(--yellow);font-weight:500}
.uploaded-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:10px}
.uploaded-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;border:0.5px solid var(--border2)}
.notes-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.note-item{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:10px 12px;display:flex;gap:10px;align-items:flex-start}
.note-dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0;margin-top:6px}
.note-text{font-size:12px;color:var(--text2);flex:1;line-height:1.5}
.note-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.note-del:hover{color:var(--red)}
.note-input-row{display:flex;gap:8px;margin-top:8px}
.note-input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none}
.note-input:focus{border-color:var(--yellow)}
.note-add-btn{background:var(--bg4);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 14px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:all 0.15s}
.note-add-btn:hover{background:var(--yellow-dim);color:var(--yellow);border-color:var(--yellow)}
.input-tab{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 16px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;font-family:"Inter",sans-serif;transition:all 0.15s}
.input-tab:hover{color:var(--text2);background:var(--bg4)}
.input-tab.active{background:var(--yellow-dim);color:var(--yellow);border-color:var(--yellow);font-weight:600}
.generate-area{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-top:12px}
.blueprint-box{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:1.25rem;font-size:11.5px;line-height:1.9;color:var(--text2);white-space:pre-wrap;max-height:500px;overflow-y:auto;font-family:'Courier New',monospace;word-break:break-word}
.blueprint-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.ghost-btn{background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 14px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;font-weight:500}
.ghost-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border3)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;animation:fadeIn 0.2s ease}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-xl);width:100%;max-width:780px;max-height:90vh;overflow-y:auto;padding:1.5rem;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:1rem}
.modal-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.modal-close{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.detail-item{background:var(--bg3);border-radius:var(--radius);padding:10px 12px;border:0.5px solid var(--border)}
.detail-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;font-weight:600}
.detail-val{font-size:13px;color:var(--text);font-weight:500}
.status-select{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none}
.status-select:focus{border-color:var(--yellow)}
.editor-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:10px;transition:all 0.2s}
.editor-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.editor-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:1rem}
.editor-card-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.editor-card-meta{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.editor-card-actions{display:flex;gap:8px}
.user-table-cols{grid-template-columns:2fr 1fr 1fr 80px}
.user-role-badge{display:inline-block;font-size:9.5px;padding:3px 9px;border-radius:20px;font-weight:600}
.role-admin{background:var(--yellow-dim);color:var(--yellow);border:0.5px solid rgba(250,204,21,0.2)}
.role-editor{background:var(--purple-dim);color:var(--purple);border:0.5px solid rgba(127,119,221,0.2)}
.add-user-form{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem}
